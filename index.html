<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>FPS Test</title>

<style>
body{
margin:0;
overflow:hidden;
font-family:sans-serif;
}

#start{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
padding:20px 40px;
background:#222;
color:white;
cursor:pointer;
}

#crosshair{
position:absolute;
top:50%;
left:50%;
width:6px;
height:6px;
background:white;
transform:translate(-50%,-50%);
border-radius:50%;
pointer-events:none;
}
</style>
</head>

<body>

<div id="start">クリックして開始</div>
<div id="crosshair"></div>

<script type="module" src="main.js"></script>

</body>
</html>
